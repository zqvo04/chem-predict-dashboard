name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: System libs for RDKit drawing
        run: sudo apt-get update && sudo apt-get install -y $(cat packages.txt)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Unit tests run offline; the live ChEMBL/PubChem smoke tests self-skip
        # when the network is unavailable, so CI stays green without secrets.
        run: python -m pytest tests/ -q
